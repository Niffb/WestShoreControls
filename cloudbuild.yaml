# Cloud Build config — Dockerfile-based build for Cloud Run.
#
# $PROJECT_ID and $COMMIT_SHA are injected automatically by Cloud Build.
# Override _SERVICE or _REGION in the trigger's Substitution variables if needed.

substitutions:
  _SERVICE: westshorecontrols2
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # 1. Pull latest image to seed layer cache (ok to fail on first run)
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE:latest || true

  # 2. Build image using repo Dockerfile
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE:$COMMIT_SHA
      - --tag
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE:latest
      - --cache-from
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - .
    env:
      - DOCKER_BUILDKIT=1

  # 3. Push both tags
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE

  # 4. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE:$COMMIT_SHA
      - --region
      - $_REGION
      - --platform
      - managed
      - --allow-unauthenticated
      - --quiet

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE:latest

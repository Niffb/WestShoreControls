# Deploy to Google Cloud Run (Docker image → GCR → Cloud Run)
#
# Required GitHub secret (Settings → Secrets and variables → Actions):
#   GCP_SA_KEY — Full JSON of a service account key. The workflow reads
#                `project_id` from this file, so you do NOT need a separate
#                GCP_PROJECT_ID secret.
#
# The service account needs permission to push to GCR/Artifact Registry and
# deploy to Cloud Run for that project.
#
# Optional: Workload Identity Federation (no JSON key) — see
# https://github.com/google-github-actions/auth#workload-identity-federation

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  REGION: us-central1
  SERVICE_NAME: westshorecontrols-production

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve GCP project from service account key
        id: gcp
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::GCP_SA_KEY is not set. Add it under Settings → Secrets and variables → Actions."
            echo "Paste the full JSON from IAM → Service Accounts → Keys → Add key (JSON)."
            exit 1
          fi
          PROJECT_ID=$(echo "$GCP_SA_KEY" | jq -r .project_id)
          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "::error::Could not read project_id from GCP_SA_KEY. Is it valid service account JSON?"
            exit 1
          fi
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "Using GCP project: $PROJECT_ID"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker push
        run: gcloud auth configure-docker --quiet

      - name: Build and push container
        run: |-
          docker build -t gcr.io/${{ steps.gcp.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push gcr.io/${{ steps.gcp.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ steps.gcp.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated
